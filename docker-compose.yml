# Versa · Docker Compose (v20.0)
# 本地一键起 app + pocketbase
# 用法: docker compose up -d

version: "3.9"

services:
  # === Versa 前端 ===
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: versa-app
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - pocketbase
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:80/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - versa-net

  # === PocketBase 后端 ===
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: versa-pocketbase
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - ./pb/pb_data:/pb/pb_data
      - ./pb/pb_public:/pb/pb_public
      - ./pb/pb_hooks:/pb/pb_hooks
    environment:
      PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL:-admin@versa.local}
      PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD:-versapass123}
    networks:
      - versa-net

  # === 可选: Caddy 反向代理 (生产) ===
  # 取消注释并提供域名 + 邮箱即可启用 HTTPS
  # caddy:
  #   image: caddy:2-alpine
  #   container_name: versa-caddy
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy_data:/data
  #     - caddy_config:/config
  #   depends_on:
  #     - app
  #   networks:
  #     - versa-net

networks:
  versa-net:
    driver: bridge

